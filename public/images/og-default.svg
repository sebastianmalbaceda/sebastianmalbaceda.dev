<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Sebastián Malbaceda Leyva — Ingeniería Informática">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0908"/>
      <stop offset="1" stop-color="#1c1815"/>
    </linearGradient>
    <radialGradient id="glow1" cx="12%" cy="18%" r="42%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="88%" cy="75%" r="38%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdba74"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdba74"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#f5f5f4" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(90,84)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#0a0908" stroke="url(#ember)" stroke-width="1.5"/>
    <path d="M18 42V18h3.4l6.8 13.6L35 18h3.4v24h-3.2V23.2L28.8 36h-1.4l-6.6-12.8V42H18z" fill="url(#ember)"/>
  </g>
  <text x="166" y="108" font-family="Fraunces, Georgia, serif" font-size="28" font-weight="500" fill="#f5f5f4">sebastián<tspan fill="url(#text)">.dev</tspan></text>
  <text x="166" y="136" font-family="'JetBrains Mono',monospace" font-size="14" fill="#78716c" letter-spacing="2.5">v2.0.0 · UAB</text>

  <g transform="translate(90,206)">
    <rect x="0" y="0" width="300" height="40" rx="20" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.25"/>
    <circle cx="22" cy="20" r="5" fill="#4ade80"/>
    <circle cx="22" cy="20" r="5" fill="#4ade80" fill-opacity="0.6"><animate attributeName="r" values="5;11;5" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="2.2s" repeatCount="indefinite"/></circle>
    <text x="42" y="25" font-family="'JetBrains Mono',monospace" font-size="13" fill="#86efac">Disponible para colaborar</text>
  </g>

  <text x="90" y="360" font-family="Fraunces, Georgia, serif" font-size="78" font-weight="500" fill="#f5f5f4" letter-spacing="-2">Construyo software</text>
  <text x="90" y="450" font-family="Fraunces, Georgia, serif" font-size="78" font-weight="500" font-style="italic" letter-spacing="-2">
    <tspan fill="url(#text)">que piensa</tspan><tspan fill="#a8a29e">, </tspan><tspan fill="url(#text)">resuelve</tspan>
  </text>

  <text x="90" y="510" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="26" fill="#a8a29e">IA · datos · producto — Barcelona, España</text>

  <g transform="translate(90,548)" font-family="'JetBrains Mono',monospace" font-size="15">
    <g><rect x="0" y="0" width="150" height="40" rx="10" fill="#14110f" stroke="#292524"/><circle cx="22" cy="20" r="4" fill="#fb923c"/><text x="40" y="25" fill="#d6d3d1">TypeScript</text></g>
    <g transform="translate(170,0)"><rect x="0" y="0" width="120" height="40" rx="10" fill="#14110f" stroke="#292524"/><circle cx="22" cy="20" r="4" fill="#fbbf24"/><text x="40" y="25" fill="#d6d3d1">Python</text></g>
    <g transform="translate(310,0)"><rect x="0" y="0" width="130" height="40" rx="10" fill="#14110f" stroke="#292524"/><circle cx="22" cy="20" r="4" fill="#4ade80"/><text x="40" y="25" fill="#d6d3d1">PyTorch</text></g>
  </g>

  <text x="1090" y="440" font-family="Fraunces, serif" font-size="380" font-weight="500" font-style="italic" fill="url(#ember)" fill-opacity="0.08" text-anchor="middle">SM</text>
</svg>
